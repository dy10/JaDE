<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00c896"/>
          <stop offset="50%" stop-color="#00a86b"/>
          <stop offset="100%" stop-color="#006644"/>
        </linearGradient>
        <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#5effd0"/>
          <stop offset="100%" stop-color="#00c896"/>
        </linearGradient>
        <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#002a1a"/>
          <stop offset="100%" stop-color="#001a10"/>
        </linearGradient>
        <linearGradient id="shimmer" x1="0%" y1="0%" x2="60%" y2="60%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="dropshadow">
          <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00a86b" flood-opacity="0.5"/>
        </filter>
        <clipPath id="roundclip">
          <rect width="256" height="256" rx="52" ry="52"/>
        </clipPath>
      </defs>

      <!-- App background -->
      <rect width="256" height="256" rx="52" fill="url(#g3)"/>
      <!-- Subtle grid lines -->
      <g opacity="0.06" stroke="#00ff88" stroke-width="1">
        <line x1="0" y1="64" x2="256" y2="64"/>
        <line x1="0" y1="128" x2="256" y2="128"/>
        <line x1="0" y1="192" x2="256" y2="192"/>
        <line x1="64" y1="0" x2="64" y2="256"/>
        <line x1="128" y1="0" x2="128" y2="256"/>
        <line x1="192" y1="0" x2="192" y2="256"/>
      </g>

      <!-- Gem shape (jade stone) with drop shadow -->
      <g filter="url(#dropshadow)">
        <polygon points="128,32  176,80  128,96  80,80" fill="url(#g2)" opacity="0.95"/>
        <polygon points="80,80  128,96  128,184  48,140" fill="#00a86b"/>
        <polygon points="176,80  128,96  128,184  208,140" fill="#007a50"/>
        <polygon points="48,140  128,184  128,220" fill="#005c3a"/>
        <polygon points="208,140  128,184  128,220" fill="#004a2e"/>
        <line x1="128" y1="96" x2="128" y2="184" stroke="#5effd0" stroke-width="1" opacity="0.4"/>
        <polygon points="128,32  176,80  128,96  80,80" fill="url(#shimmer)"/>
        <polygon points="128,38  168,78  128,90  88,78" fill="none" stroke="#9effd8" stroke-width="1" opacity="0.5"/>
      </g>

      <!-- Code brackets inside gem -->
      <g filter="url(#glow)" opacity="0.9">
        <polyline points="96,118  82,128  96,138" fill="none" stroke="#b0ffe0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="160,118  174,128  160,138" fill="none" stroke="#b0ffe0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="136" y1="114" x2="120" y2="142" stroke="#5effd0" stroke-width="4" stroke-linecap="round"/>
      </g>

      <!-- JaDE wordmark at bottom -->
      <text x="128" y="244" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" font-weight="bold" letter-spacing="5" fill="#3dffa0" opacity="0.85">JaDE</text>
    </svg>
