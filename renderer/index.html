<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; worker-src blob:;" />
  <title>JaDE</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Tab bar -->
  <div id="tabbar"></div>

  <!-- Main area: sidebar + editor -->
  <div id="main">
    <div id="sidebar">
      <div id="sidebar-header">EXPLORER</div>
      <div id="file-tree"></div>
    </div>
    <div id="sidebar-resize"></div>
    <div id="editor-area">
      <div id="editor-container"></div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="status-text"></span>
    <span id="status-spinner" class="spinner hidden"></span>
  </div>

  <!-- Open Type dialog overlay -->
  <div id="open-type-overlay" class="hidden">
    <div id="open-type-dialog">
      <input id="open-type-input" type="text" placeholder="Type a class name…" autocomplete="off" spellcheck="false" />
      <div id="open-type-results"></div>
    </div>
  </div>

  <!-- Open Resource dialog overlay (Cmd+Shift+R) -->
  <div id="open-resource-overlay" class="hidden">
    <div id="open-resource-dialog">
      <input id="open-resource-input" type="text" placeholder="Type a file name…" autocomplete="off" spellcheck="false" />
      <div id="open-resource-results"></div>
    </div>
  </div>

  <script src="../node_modules/monaco-editor/min/vs/loader.js"></script>
  <script src="filetree.js"></script>
  <script src="tabs.js"></script>
  <script src="editor.js"></script>
</body>
</html>
